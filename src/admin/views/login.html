<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp AI Bot — Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080b12;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-card {
      background: #161b22;
      border: 1px solid rgba(37,211,102,0.15);
      border-radius: 16px;
      padding: 48px 40px;
      width: 400px;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    h1 {
      color: #e6edf3;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: #0d1117;
      border: 1px solid rgba(37,211,102,0.2);
      border-radius: 8px;
      color: #e6edf3;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #25D366;
    }
    .eye-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    .eye-toggle:hover { color: #e6edf3; }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #20bd5a; }
    .error-msg {
      color: #f85149;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🤖</div>
    <h1>WhatsApp AI Bot</h1>
    <p class="subtitle">Admin Panel</p>

    <form action="/admin/login" method="POST">
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" placeholder="Enter admin password" required autocomplete="current-password">
          <button type="button" class="eye-toggle" onclick="togglePassword()">👁</button>
        </div>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>

    <p class="error-msg" id="errorMsg">Invalid password. Please try again.</p>
    <div style="margin-top:20px;font-size:11px;color:#666;">
      Developed by <b>Tarif Ahmed</b> (infinityX)<br>
      <a href="https://t.me/infinityxbd" target="_blank" style="color:#25D366;text-decoration:none;">Telegram</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('errorMsg').classList.add('show');
    }
  </script>
</body>
</html>
